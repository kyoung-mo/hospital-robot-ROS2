name: turtlebot_test_bridge
from_domain: 7
to_domain: 5

topics:
  amcl_pose:
    type: geometry_msgs/msg/PoseWithCovarianceStamped
    remap: /robot2/amcl_pose

  battery_state:
    type: sensor_msgs/msg/BatteryState
    remap: /robot2/battery_state

  robot2/goal_pose:
    type: geometry_msgs/msg/PoseStamped
    reversed: True
    remap: goal_pose
